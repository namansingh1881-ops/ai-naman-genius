<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Naman Genius</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;
  overflow-x:hidden;
  background:black;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at 30% 30%,#00f5ff22,transparent),
              radial-gradient(circle at 70% 70%,#ff00ff22,transparent),
              linear-gradient(#050510,#000);
  z-index:-1;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:70px;
  background:linear-gradient(90deg,#00f5ff,#ff00ff);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  font-size:22px;
  opacity:0.8;
}

.btn{
  margin:12px;
  padding:14px 30px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#00f5ff,#ff00ff);
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
}

/* 3 DOT BUTTON */
.menuBtn{
  position:fixed;
  top:20px;
  right:20px;
  font-size:30px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
  z-index:999;
}

/* MENU BOX */
.menuBox{
  display:none;
  position:fixed;
  top:60px;
  right:20px;
  background:rgba(20,20,20,0.95);
  backdrop-filter:blur(10px);
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 20px #000;
  animation:fadeIn 0.3s;
}

.menuBox a{
  color:white;
  text-decoration:none;
  display:block;
  padding:8px 12px;
  border-radius:8px;
  transition:0.2s;
}

.menuBox a:hover{
  background:#222;
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(-10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>

</head>
<body>

<div class="bg"></div>

<!-- 3 DOT BUTTON -->
<button class="menuBtn" onclick="toggleMenu()">⋮</button>

<div id="menuBox" class="menuBox">
  <a href="index.html">🏠 Home</a>
  <a href="services.html">🛠 Services</a>
  <a href="contact.html">📞 Contact</a>
</div>

<!-- HERO -->
<div class="hero">
  <h1>AI Naman Genius</h1>
  <p>Your Digital Growth Partner</p>
  <a href="contact.html" class="btn">Hire Me</a>
  <a href="ai.html" class="btn">Talk to AI</a>
</div>

<script>
function toggleMenu(){
  var menu = document.getElementById("menuBox");
  menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

/* CLICK OUTSIDE = CLOSE MENU */
window.onclick = function(e){
  if(!e.target.matches('.menuBtn')){
    document.getElementById("menuBox").style.display="none";
  }
}
</script>

</body>
</html>
