 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Naman Genius</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;
  background:black;
  overflow-x:hidden;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at 30% 30%,#00f5ff22,transparent),
              radial-gradient(circle at 70% 70%,#ff00ff22,transparent),
              linear-gradient(#050510,#000);
  z-index:-1;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:60px;
  background:linear-gradient(90deg,#00f5ff,#ff00ff);
  -webkit-background-clip:text;
  color:transparent;
}

.btn{
  margin:12px;
  padding:16px 34px;
  border:none;
  border-radius:40px;
  background:linear-gradient(90deg,#00f5ff,#ff00ff);
  color:black;
  font-weight:bold;
  font-size:18px;
  cursor:pointer;
  text-decoration:none;
}

/* 3 DOT BUTTON LEFT */
.menuBtn{
  position:fixed;
  top:20px;
  left:20px;
  font-size:30px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

/* SIDE MENU LEFT FULL */
.menuBox{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:rgba(0,0,0,0.95);
  backdrop-filter:blur(10px);
  padding:20px;
  transition:0.4s;
  box-shadow:0 0 25px #000;
}

.menuBox a{
  color:white;
  text-decoration:none;
  display:block;
  padding:12px;
  font-size:18px;
}

.menuBox hr{
  margin:15px 0;
  border:0.5px solid #444;
}

/* CONTACT INFO */
.contactInfo{
  font-size:14px;
  line-height:1.6;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- 3 DOT BUTTON -->
<button class="menuBtn" onclick="toggleMenu()">⋮</button>

<!-- SIDE MENU -->
<div id="menuBox" class="menuBox">
  <a href="index.html">🏠 Home</a>
  <a href="services.html">🛠 Services</a>
  <a href="contact.html">📩 Contact</a>

  <hr>

  <div class="contactInfo">
    📧 Namosyx@gmail.com<br>
    📍 New Delhi<br>
    📸 @naman_singh6556
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>AI Naman Genius</h1>
  <p>Your Digital Growth Partner</p>

  <!-- WORKING BUTTONS -->
  <a href="contact.html" class="btn">Hire Me</a>
  <a href="ai.html" class="btn">Talk to AI</a>
</div>

<script>
function toggleMenu(){
  var menu = document.getElementById("menuBox");
  if(menu.style.left === "0px"){
    menu.style.left = "-260px";
  } else {
    menu.style.left = "0px";
  }
}
</script>

</body>
</html>
