<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Naman Genius</title><style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;
  overflow-x:hidden;
  background:black;
}

/* ANIMATED BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at 30% 30%,#00f5ff22,transparent),
              radial-gradient(circle at 70% 70%,#ff00ff22,transparent),
              linear-gradient(#050510,#000);
  z-index:-1;
  animation:move 10s infinite alternate;
}

@keyframes move{
  from{transform:scale(1) rotate(0deg);}
  to{transform:scale(1.2) rotate(3deg);}
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:75px;
  margin:0;
  background:linear-gradient(90deg,#00f5ff,#ff00ff);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  font-size:24px;
  opacity:0.9;
}

/* BUTTON */
.btn{
  margin:12px;
  padding:14px 30px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#00f5ff,#ff00ff);
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
}

/* GLASS SECTIONS */
section{
  padding:70px 20px;
  text-align:center;
}

.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:16px;
  width:220px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-12px);
  background:rgba(255,255,255,0.18);
}

/* CHAT */
.chat{
  display:none;
  position:fixed;
  bottom:20px;
  right:20px;
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
  width:250px;
}
</style></head><body><div class="bg"></div><div class="hero">
  <h1>AI Naman Genius</h1>
  <p>Your Digital Growth Partner</p>
  <button class="btn">Hire Me</button>
  <button class="btn" onclick="openChat()">Talk to AI</button>
</div><section>
  <h2>About Me</h2>
  <p>I create powerful websites, AI tools, and digital solutions.</p>
</section><section>
  <h2>Services</h2>
  <div class="cards">
    <div class="card">Website Development</div>
    <div class="card">AI Chatbot</div>
    <div class="card">Digital Marketing</div>
    <div class="card">UI/UX Design</div>
  </div>
</section><div id="chatBox" class="chat">
  <b>AI Naman Support</b>
  <p>Hello 👋 How can I help?</p>
</div><script>
function openChat(){
  document.getElementById("chatBox").style.display="block";
}
</script></body>
</html>
