<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Naman Genius</title>

<style>

/* GLOBAL */
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:black;
  color:white;
}

/* CYBER BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:
  radial-gradient(circle at 20% 30%,#00f5ff22,transparent),
  radial-gradient(circle at 80% 70%,#ff00ff22,transparent),
  linear-gradient(#050510,#000);
  z-index:-1;
}

/* MENU BUTTON */
.menuBtn{
  position:fixed;
  top:20px;
  left:20px;
  font-size:30px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

/* MENU BOX */
.menuBox{
  display:none;
  position:fixed;
  top:70px;
  left:20px;
  background:rgba(0,0,0,0.9);
  padding:20px;
  border-radius:14px;
  width:260px;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:70px;
  background:linear-gradient(90deg,#00f5ff,#ff00ff);
  -webkit-background-clip:text;
  color:transparent;
}

/* BUTTON */
.btn{
  margin:12px;
  padding:16px 36px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#00f5ff,#ff00ff);
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:40px;
}

.card{
  background:#111;
  padding:25px;
  border-radius:12px;
}

/* ORDER BUTTON */
.orderBtn{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:linear-gradient(90deg,#00f5ff,#ff00ff);
  font-weight:bold;
  cursor:pointer;
}

/* POPUP FORM */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000c;
  display:none;
}

.formBox{
  background:#111;
  padding:20px;
  margin:60px auto;
  width:90%;
  max-width:400px;
  border-radius:12px;
}

input, textarea{
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  border:none;
}

footer{
  text-align:center;
  padding:30px;
  background:#050510;
}

</style>
</head>

<body>

<div class="bg"></div>

<button class="menuBtn" onclick="toggleMenu()">☰</button>

<div id="menuBox" class="menuBox">
  <a href="#">Home</a>
  <a href="#services">Services</a>
  <a href="#pricing">Pricing</a>
  <a href="#contact">Contact</a>
</div>

<!-- HERO -->
<div class="hero">
  <h1>AI Naman Genius</h1>
  <p>Your Cyber AI Digital Partner</p>

  <a href="#contact" class="btn">Hire Me</a>
  <a href="ai.html" class="btn">Talk to AI</a>
</div>

<!-- SERVICES -->
<div id="services" class="section">
  <h2>My Services</h2>
</div>

<!-- PRICING -->
<div id="pricing" class="section">
  <h2>Pricing</h2>

  <div class="grid">

    <div class="card">
      <h3>Demo Website</h3>
      <p>₹99</p>
      <button class="orderBtn" onclick="openForm('Demo Website')">Order Now</button>
    </div>

    <div class="card">
      <h3>Influencer Website</h3>
      <p>₹199</p>
      <button class="orderBtn" onclick="openForm('Influencer Website')">Order Now</button>
    </div>

    <div class="card">
      <h3>Professional Website</h3>
      <p>₹349</p>
      <button class="orderBtn" onclick="openForm('Professional Website')">Order Now</button>
    </div>

    <div class="card">
      <h3>Business Website</h3>
      <p>₹699</p>
      <button class="orderBtn" onclick="openForm('Business Website')">Order Now</button>
    </div>

  </div>
</div>

<!-- CONTACT -->
<div id="contact" class="section">
  <h2>Contact</h2>
  <p>Email: Namosyx@gmail.com</p>
</div>

<footer>
  © 2026 AI Naman Genius
</footer>

<!-- ORDER FORM -->
<div id="orderForm" class="popup">
  <div class="formBox">
    <h2>Website Order</h2>

    <input id="name" placeholder="Your Name">
    <input id="phone" placeholder="Phone Number">
    <input id="email" placeholder="Email">
    <textarea id="details" placeholder="Website details"></textarea>

    <button class="orderBtn" onclick="sendOrder()">Submit</button>
    <button class="orderBtn" onclick="closeForm()">Close</button>
  </div>
</div>

<script>

function toggleMenu(){
  var menu = document.getElementById("menuBox");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

let selectedPlan = "";

function openForm(plan){
  selectedPlan = plan;
  document.getElementById("orderForm").style.display="block";
}

function closeForm(){
  document.getElementById("orderForm").style.display="none";
}

function sendOrder(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let email = document.getElementById("email").value;
  let details = document.getElementById("details").value;

  let msg =
  "NEW WEBSITE ORDER%0A" +
  "Plan: " + selectedPlan + "%0A" +
  "Name: " + name + "%0A" +
  "Phone: " + phone + "%0A" +
  "Email: " + email + "%0A" +
  "Details: " + details;

  window.open("https://wa.me/91XXXXXXXXXX?text=" + msg);

}

</script>

</body>
</html>
