<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Naman Support</title>

<style>

/* GLOBAL */
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:black;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#050510;
  box-shadow:0 0 10px #000;
}

.title{
  font-size:20px;
}

.homeBtn{
  text-decoration:none;
  color:black;
  background:linear-gradient(90deg,#00f5ff,#ff00ff);
  padding:8px 16px;
  border-radius:10px;
  font-weight:bold;
}

/* CHAT AREA */
#chat{
  height:78vh;
  overflow-y:auto;
  padding:15px;
}

/* MESSAGE */
.msg{
  margin:10px 0;
  display:flex;
}

.user{
  justify-content:flex-end;
}

.ai{
  justify-content:flex-start;
}

.bubble{
  max-width:75%;
  padding:12px 16px;
  border-radius:16px;
}

.user .bubble{
  background:#00f5ff;
  color:black;
}

.ai .bubble{
  background:#111;
  border:1px solid #333;
}

/* INPUT AREA */
.inputArea{
  position:fixed;
  bottom:0;
  width:100%;
  background:#050510;
  padding:12px;
  display:flex;
  gap:10px;
}

#msg{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
}

.sendBtn{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00f5ff,#ff00ff);
  font-weight:bold;
  cursor:pointer;
}

.clearBtn{
  background:#222;
  color:white;
}

</style>
</head>

<body>

<div class="header">
  <div class="title">AI Naman Support 🤖</div>
  <a href="index.html" class="homeBtn">Home</a>
</div>

<div id="chat"></div>

<div class="inputArea">
  <input id="msg" placeholder="Type message...">
  <button class="sendBtn" onclick="send()">Send</button>
  <button class="sendBtn clearBtn" onclick="clearChat()">Clear</button>
</div>

<script>

/* SEND MESSAGE */
function send(){

  let input = document.getElementById("msg");
  let text = input.value.trim();
  if(text==="") return;

  addUser(text);
  input.value="";

  setTimeout(()=>reply(text.toLowerCase()),600);
}

/* ADD USER MESSAGE */
function addUser(text){
  let chat = document.getElementById("chat");
  chat.innerHTML += `
  <div class="msg user">
    <div class="bubble">${text}</div>
  </div>`;
  scrollDown();
}

/* ADD AI MESSAGE */
function addAI(text){
  let chat = document.getElementById("chat");
  chat.innerHTML += `
  <div class="msg ai">
    <div class="bubble">${text}</div>
  </div>`;
  scrollDown();
}

/* REPLY SYSTEM */
function reply(text){

  let r="";

  // OWNER CONTACT KEYWORDS
  if(
    text.includes("help") ||
    text.includes("owner") ||
    text.includes("admin") ||
    text.includes("contact") ||
    text.includes("baat") ||
    text.includes("madad") ||
    text.includes("support")
  ){
    r = `
    📩 Contact Owner:

    Email: Namosyx@gmail.com
    Instagram: @naman_singh6556
    Location: New Delhi

    Owner will reply soon 🚀
    `;
  }

  // PRICING
  else if(text.includes("price") || text.includes("cost")){
    r = `
    💰 Pricing:

    Demo Website — ₹99
    Influencer Website — ₹199
    Professional Website — ₹349
    Business Website — ₹699
    `;
  }

  // SERVICES
  else if(text.includes("service")){
    r = `
    🛠 Services:

    Website Development  
    AI Chatbot  
    Logo Design  
    Business Ideas  
    `;
  }

  // DEFAULT
  else{
    r = "Hello 👋 I am AI Naman Support. Ask me about services, pricing or contact.";
  }

  addAI(r);
}

/* CLEAR CHAT */
function clearChat(){
  document.getElementById("chat").innerHTML="";
}

/* SCROLL DOWN */
function scrollDown(){
  let chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
