<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Naman Support</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

/* HEADER */
.header{
  background:#050510;
  padding:15px;
  font-size:22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.homeBtn{
  background:linear-gradient(90deg,#00f5ff,#ff00ff);
  padding:8px 16px;
  border-radius:12px;
  text-decoration:none;
  color:black;
  font-weight:bold;
}

/* CHAT */
#chat{
  height:78vh;
  overflow-y:auto;
  padding:15px;
}

/* MESSAGE */
.msg{
  margin:12px 0;
}

.user{ text-align:right; }
.ai{ text-align:left; }

.bubble{
  display:inline-block;
  padding:12px 16px;
  border-radius:16px;
  max-width:75%;
}

.user .bubble{
  background:#00f5ff;
  color:black;
}

.ai .bubble{
  background:#111;
}

/* INPUT AREA */
.inputArea{
  position:fixed;
  bottom:0;
  width:100%;
  background:#050510;
  padding:10px;
  display:flex;
  gap:8px;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00f5ff,#ff00ff);
  font-weight:bold;
}

.clearBtn{
  background:#333;
  color:white;
}

</style>
</head>

<body>

<div class="header">
  AI Naman Support 🤖
  <a href="index.html" class="homeBtn">Home</a>
</div>

<div id="chat"></div>

<div class="inputArea">
  <input id="msg" placeholder="Type message..." onkeypress="if(event.key==='Enter')send()">
  <button onclick="send()">Send</button>
  <button class="clearBtn" onclick="clearChat()">Clear</button>
</div>

<script>

// FIRST MESSAGE
window.onload = ()=>{
  aiMsg("Hello 👋 I am AI Naman Support.\nAsk about services, pricing, order or contact.");
};

function userMsg(text){
  chat.innerHTML += `
  <div class="msg user">
    <span class="bubble">${text}</span>
  </div>`;
}

function aiMsg(text){
  chat.innerHTML += `
  <div class="msg ai">
    <span class="bubble">${text}</span>
  </div>`;
  chat.scrollTop = chat.scrollHeight;
}

function send(){

  let input = document.getElementById("msg");
  let text = input.value.toLowerCase();
  if(text=="") return;

  userMsg(text);

  let reply = "";

  // CONTACT OWNER
  if(
    text.includes("help") ||
    text.includes("owner") ||
    text.includes("contact") ||
    text.includes("support") ||
    text.includes("madad") ||
    text.includes("baat")
  ){
    reply = `
📩 Contact Owner:

Email: Namosyx@gmail.com
Instagram: @naman_singh6556
Location: New Delhi

Owner will reply soon 🚀
`;
  }

  // PRICE
  else if(
    text.includes("price") ||
    text.includes("rate") ||
    text.includes("cost") ||
    text.includes("pricing")
  ){
    reply = `
💰 Pricing:

Demo Website — ₹99
Influencer Website — ₹199
Professional Website — ₹349
Business Website — ₹699
`;
  }

  // ORDER WEBSITE
  else if(
    text.includes("website") ||
    text.includes("banwani") ||
    text.includes("banwana") ||
    text.includes("order") ||
    text.includes("buy")
  ){
    reply = `
🚀 Website Order Started!

Please send:

1️⃣ Website type
2️⃣ Your name
3️⃣ Requirement

Owner will contact you 🔥
`;
  }

  // LOGO DESIGN
  else if(text.includes("logo")){
    reply = "🎨 Logo design available. Tell your business name & style.";
  }

  // AI SERVICE
  else if(text.includes("ai")){
    reply = "🤖 AI services available for business ideas & automation.";
  }

  // DEFAULT
  else{
    reply = "I can help with website, logo, AI tools, pricing or contact.";
  }

  setTimeout(()=>aiMsg(reply),500);

  input.value="";
}

function clearChat(){
  chat.innerHTML="";
  aiMsg("Chat cleared ✔️");
}

</script>

</body>
</html>
