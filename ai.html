<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Naman Support</title>
</head>

<body style="background:black;font-family:sans-serif;color:white">

<h2 style="text-align:center">AI Naman Support 🤖</h2>

<div id="chatArea" style="
height:55vh;
overflow-y:auto;
padding:10px;
margin-bottom:80px;
"></div>

<div style="
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:10px;
z-index:999;
">

<input id="msg" type="text" placeholder="Type message..." style="
width:70%;
padding:10px;
border-radius:10px;
border:none;
">

<button onclick="sendMsg()" style="
padding:10px 18px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00f5ff,#ff00ff);
font-weight:bold;
">🚀 Send</button>

</div>

<script>

function sendMsg(){

let input = document.getElementById("msg");
let text = input.value.toLowerCase();
if(text=="") return;

let area = document.getElementById("chatArea");

// USER MESSAGE
area.innerHTML += `
<div style="text-align:right;margin:10px">
<span style="
background:#00f5ff;
color:black;
padding:10px 14px;
border-radius:15px;
display:inline-block;
">${text}</span>
</div>`;

input.value="";


// 🤖 SMART AI REPLY
let reply="";

if(text.includes("hello") || text.includes("hi"))
reply="Hello 👋 I am AI Naman Support. How can I help you?";

else if(text.includes("contact"))
reply="📞 Contact: +91 XXXXXXXX";

else if(text.includes("service"))
reply="We provide Website Development, AI Chatbot, Digital Marketing, UI/UX";

else if(text.includes("price"))
reply="Pricing depends on project. Please contact for details.";

else
reply="I am learning 🤖 Please ask about services or contact.";


// AI MESSAGE
setTimeout(()=>{
area.innerHTML += `
<div style="text-align:left;margin:10px">
<span style="
background:#222;
padding:10px 14px;
border-radius:15px;
display:inline-block;
">${reply}</span>
</div>`;

area.scrollTop = area.scrollHeight;

},500);

}

</script>

</body>
</html>
