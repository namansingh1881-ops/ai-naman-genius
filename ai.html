<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>
</head>

<body style="background:black;font-family:sans-serif;color:white">

<h2 style="text-align:center">AI Naman Support 🤖</h2>

<!-- CHAT AREA -->
<div id="chatArea" style="
height:65vh;
overflow-y:auto;
padding:10px;
"></div>

<!-- INPUT AREA -->
<div style="
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:10px;
">

<input id="msg" type="text" placeholder="Type message..." style="
width:70%;
padding:10px;
border-radius:10px;
border:none;
">

<button onclick="sendMsg()" style="
padding:10px 18px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00f5ff,#ff00ff);
font-weight:bold;
">🚀 Send</button>

</div>

<script>
async function sendMsg(){

  let input = document.getElementById("msg");
  let text = input.value;
  if(text=="") return;

  let area = document.getElementById("chatArea");

  // USER MESSAGE
  area.innerHTML += `
  <div style="text-align:right;margin:10px">
    <span style="
      background:#00f5ff;
      color:black;
      padding:10px 14px;
      border-radius:15px;
      display:inline-block;
    ">${text}</span>
  </div>`;

  input.value="";

  // 🔥 GOOGLE GEMINI API CALL

  const response = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:key=AIzaSyAfAkhowyBI2e9-ijErdoTjziHJDTLXdv8
    {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        contents: [{ parts: [{ text: text }] }]
      })
    }
  );

  const data = await response.json();

  let reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Error 😢";

  // AI MESSAGE
  area.innerHTML += `
  <div style="text-align:left;margin:10px">
    <span style="
      background:#222;
      padding:10px 14px;
      border-radius:15px;
      display:inline-block;
    ">${reply}</span>
  </div>`;

  area.scrollTop = area.scrollHeight;
}
</script>

</body>
</html>
